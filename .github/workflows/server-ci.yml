# Backend CI (blueprint §20). Scoped to server/** in this monorepo.
name: server-ci

on:
  push:
    branches: [main]
    paths: ["server/**", ".github/workflows/server-ci.yml"]
  pull_request:
    paths: ["server/**", ".github/workflows/server-ci.yml"]

defaults:
  run:
    working-directory: server

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore
      - run: dotnet format --verify-no-changes --no-restore
      - run: dotnet build -c Release --no-restore
      # Integration tests spin up Postgres/Redis via Testcontainers (Docker is on the runner).
      - run: dotnet test -c Release --no-build --collect:"XPlat Code Coverage"

  publish:
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: server
          file: server/docker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
