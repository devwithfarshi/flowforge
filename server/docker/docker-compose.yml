# Local stack (blueprint §19.2). From server/:  docker compose -f docker/docker-compose.yml up
services:
  api:
    build: { context: .., dockerfile: docker/Dockerfile }
    ports: ["8080:8080"]
    environment:
      - ConnectionStrings__Postgres=Host=postgres;Database=flowforge;Username=flow;Password=flow
      - Redis__ConnectionString=redis:6379
      - Jwt__SigningKey=flowforge-local-compose-signing-key-not-for-production!
      - Database__MigrateOnStartup=true
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
  postgres:
    image: postgres:16
    environment: { POSTGRES_DB: flowforge, POSTGRES_USER: flow, POSTGRES_PASSWORD: flow }
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U flow"], interval: 5s, retries: 10 }
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
volumes: { pgdata: {} }
